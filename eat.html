<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍽️ 我的美食随机器 - k1ana.cn</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
body {
  background: #0a0a0f;
  color: #eaeaea;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  width: 100%;
  max-width: 520px;
}
.card {
  background: #121217;
  border: 1px solid #333;
  border-radius: 20px;
  padding: 28px;
  box-shadow: 0 0 30px rgba(114, 102, 255, 0.2);
}
h1 {
  font-size: 24px;
  color: #fff;
  text-shadow: 0 0 10px #7266ff;
  margin-bottom: 6px;
  text-align: center;
}
.desc {
  font-size: 14px;
  color: #888;
  margin-bottom: 24px;
  text-align: center;
}

/* 上传区域 - 双端适配 */
.upload-area {
  border: 2px dashed #7266ff;
  border-radius: 12px;
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  margin-bottom: 20px;
  transition: all 0.2s ease;
  background: transparent;
}
.upload-area:hover {
  background: rgba(114, 102, 255, 0.1);
  border-color: #ff5588;
}
#imgInput {
  display: none;
}
.ocr-tip {
  font-size: 13px;
  color: #aaa;
  margin-top: 8px;
}

/* 结果/状态区域 */
.result-box {
  background: #1a1a24;
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 16px;
  min-height: 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  word-break: break-word;
}
.result-text {
  font-size: 20px;
  font-weight: bold;
  color: #ff5588;
  margin-bottom: 4px;
}
.result-tip {
  font-size: 13px;
  color: #aaa;
}

/* 按钮区域 */
.btn-row {
  display: flex;
  gap: 12px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.btn {
  flex: 1;
  min-width: 140px;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #7266ff, #ff5588);
  color: #fff;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.btn:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}
.btn.manual {
  background: #222;
  color: #7266ff;
  border: 1px solid #7266ff;
}
.btn.confirm {
  background: #28a745;
  border: none;
  margin-top: 8px;
}
.btn.cancel {
  background: #333;
  color: #ff5555;
  border: 1px solid #ff5555;
  margin-top: 8px;
}

/* 店铺列表 */
.list-title {
  font-size: 17px;
  margin-bottom: 16px;
  color: #ddd;
  padding-left: 4px;
}
.shop-item {
  background: #1a1a24;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.shop-name {
  flex: 1;
  font-size: 15px;
  word-break: break-word;
  min-width: 200px;
}
.shop-actions {
  display: flex;
  gap: 8px;
}
.shop-edit, .shop-del {
  background: #282832;
  border: none;
  color: #aaa;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s ease;
}
.shop-edit {
  color: #7266ff;
}
.shop-edit:hover {
  background: rgba(114, 102, 255, 0.2);
}
.shop-del {
  color: #ff5555;
}
.shop-del:hover {
  background: rgba(255, 85, 85, 0.2);
}
.empty-list {
  text-align: center;
  color: #666;
  padding: 24px;
  font-size: 14px;
  background: #1a1a24;
  border-radius: 10px;
}

/* 弹窗 */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 999;
}
.modal-box {
  background: #121217;
  border-radius: 16px;
  padding: 28px;
  width: 100%;
  max-width: 420px;
}
.modal-title {
  font-size: 18px;
  margin-bottom: 16px;
  color: #fff;
}
.modal-input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  background: #1a1a24;
  border: 1px solid #333;
  color: #fff;
  margin-bottom: 20px;
  font-size: 15px;
}
.modal-btns {
  display: flex;
  gap: 12px;
}

/* 加载动画 */
.loading-spinner {
  width: 24px;
  height: 24px;
  border: 3px solid rgba(114, 102, 255, 0.3);
  border-radius: 50%;
  border-top-color: #7266ff;
  animation: spin 1s linear infinite;
  margin: 8px auto;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>🍽️ 我的美食随机器</h1>
    <p class="desc">自定义店铺 · 随机不纠结 · 双端稳定</p>

    <!-- 上传区域 -->
    <label class="upload-area" id="uploadBtn">
      <p>📸 上传外卖/点评截图导入店铺</p>
      <p class="ocr-tip">支持饿了么/美团，自动提取+人工确认</p>
    </label>
    <input type="file" id="imgInput" accept="image/*">

    <!-- 结果区域 -->
    <div class="result-box" id="resultBox">
      <div class="result-text">请添加店铺后随机推荐</div>
    </div>

    <!-- 操作按钮 -->
    <div class="btn-row">
      <button class="btn" id="randomBtn">🎲 随机推荐</button>
      <button class="btn manual" id="addManualBtn">✏️ 手动添加</button>
    </div>

    <!-- 店铺列表 -->
    <div class="list-title">📋 我的店铺列表</div>
    <div id="shopListContainer">
      <div class="empty-list">暂无店铺，快去添加吧～</div>
    </div>
  </div>
</div>

<!-- 修改弹窗 -->
<div class="modal" id="editModal">
  <div class="modal-box">
    <div class="modal-title">修改店铺名</div>
    <input type="text" class="modal-input" id="editInput">
    <div class="modal-btns">
      <button class="btn" id="saveEditBtn">保存</button>
      <button class="btn cancel" id="cancelEditBtn">取消</button>
    </div>
  </div>
</div>

<!-- 识别确认弹窗 -->
<div class="modal" id="confirmModal">
  <div class="modal-box">
    <div class="modal-title">确认店铺名</div>
    <input type="text" class="modal-input" id="confirmInput">
    <div class="modal-btns">
      <button class="btn confirm" id="confirmAddBtn">确认添加</button>
      <button class="btn cancel" id="cancelAddBtn">取消</button>
    </div>
  </div>
</div>

<!-- 引入Tesseract（官方CDN，双端兼容） -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.0/dist/tesseract.min.js"></script>
<script>
// ==================== 核心数据层 ====================
let shopList = JSON.parse(localStorage.getItem('myFoodShops')) || [];
let editingShopIndex = -1;

// ==================== DOM元素 ====================
const resultBox = document.getElementById('resultBox');
const randomBtn = document.getElementById('randomBtn');
const addManualBtn = document.getElementById('addManualBtn');
const shopListContainer = document.getElementById('shopListContainer');
const uploadBtn = document.getElementById('uploadBtn');
const imgInput = document.getElementById('imgInput');
const editModal = document.getElementById('editModal');
const editInput = document.getElementById('editInput');
const saveEditBtn = document.getElementById('saveEditBtn');
const cancelEditBtn = document.getElementById('cancelEditBtn');
const confirmModal = document.getElementById('confirmModal');
const confirmInput = document.getElementById('confirmInput');
const confirmAddBtn = document.getElementById('confirmAddBtn');
const cancelAddBtn = document.getElementById('cancelAddBtn');

// ==================== 工具函数 ====================
// 压缩图片（解决手机识别慢/超时）
function compressImage(file, maxWidth = 800, quality = 0.8) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ratio = img.width / img.height;
        const width = Math.min(img.width, maxWidth);
        const height = width / ratio;
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          resolve(blob);
        }, 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// 过滤垃圾文本（精准提取店名）
function cleanShopName(text) {
  const lines = text.split('\n')
    .map(line => line.trim())
    .filter(line => {
      // 过滤掉订单、时间、价格、符号等垃圾信息
      return line.length > 1 
        && !/订单|编号|时间|配送|￥|金额|满减|优惠|合计/.test(line)
        && !/^\d+$/.test(line)
        && !/^[^\w\u4e00-\u9fa5]+$/.test(line);
    });
  return lines[0] || '未识别到有效店名';
}

// ==================== 渲染层 ====================
// 渲染店铺列表
function renderShopList() {
  if (shopList.length === 0) {
    shopListContainer.innerHTML = '<div class="empty-list">暂无店铺，快去添加吧～</div>';
    return;
  }

  shopListContainer.innerHTML = shopList.map((shop, index) => `
    <div class="shop-item">
      <div class="shop-name">${shop}</div>
      <div class="shop-actions">
        <button class="shop-edit" onclick="openEditModal(${index})">修改</button>
        <button class="shop-del" onclick="deleteShop(${index})">删除</button>
      </div>
    </div>
  `).join('');
}

// 保存到本地存储
function saveShopList() {
  localStorage.setItem('myFoodShops', JSON.stringify(shopList));
  renderShopList();
}

// ==================== 核心功能层 ====================
// 随机推荐
randomBtn.addEventListener('click', () => {
  if (shopList.length === 0) {
    resultBox.innerHTML = `
      <div class="result-text" style="color:#ff5555;">⚠️ 请先添加店铺</div>
      <div class="result-tip">可以手动添加或截图导入</div>
    `;
    return;
  }
  const randomShop = shopList[Math.floor(Math.random() * shopList.length)];
  resultBox.innerHTML = `
    <div class="result-text">${randomShop}</div>
    <div class="result-tip">为你随机推荐的店铺</div>
  `;
});

// 手动添加店铺
addManualBtn.addEventListener('click', () => {
  const shopName = prompt('请输入店铺名：');
  if (!shopName || !shopName.trim()) return;
  const trimmedName = shopName.trim();
  
  if (shopList.includes(trimmedName)) {
    resultBox.innerHTML = `
      <div class="result-text" style="color:#ff5555;">⚠️ 该店铺已存在</div>
    `;
    return;
  }

  shopList.push(trimmedName);
  saveShopList();
  resultBox.innerHTML = `
    <div class="result-text" style="color:#28a745;">✅ 添加成功</div>
    <div class="result-tip">${trimmedName}</div>
  `;
});

// 打开修改弹窗
window.openEditModal = (index) => {
  editingShopIndex = index;
  editInput.value = shopList[index];
  editModal.style.display = 'flex';
};

// 保存修改
saveEditBtn.addEventListener('click', () => {
  const newName = editInput.value.trim();
  if (!newName) return;
  
  if (shopList.includes(newName) && newName !== shopList[editingShopIndex]) {
    alert('该店铺名已存在');
    return;
  }

  shopList[editingShopIndex] = newName;
  saveShopList();
  editModal.style.display = 'none';
  resultBox.innerHTML = `
    <div class="result-text" style="color:#28a745;">✅ 修改成功</div>
    <div class="result-tip">${newName}</div>
  `;
});

// 取消修改
cancelEditBtn.addEventListener('click', () => {
  editModal.style.display = 'none';
});

// 删除店铺
window.deleteShop = (index) => {
  if (!confirm('确定要删除该店铺吗？')) return;
  const deletedShop = shopList[index];
  shopList.splice(index, 1);
  saveShopList();
  resultBox.innerHTML = `
    <div class="result-text" style="color:#ff5555;">🗑️ 已删除</div>
    <div class="result-tip">${deletedShop}</div>
  `;
};

// ==================== OCR功能层（双端稳） ====================
// 上传截图识别
uploadBtn.addEventListener('click', () => {
  imgInput.click();
});

imgInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  // 显示加载状态
  resultBox.innerHTML = `
    <div class="loading-spinner"></div>
    <div class="result-tip">正在识别图片...</div>
  `;

  try {
    // 1. 压缩图片（解决手机性能问题）
    const compressedFile = await compressImage(file);

    // 2. 15秒超时+进度显示，彻底解决卡死
    const recognizePromise = Tesseract.recognize(
      compressedFile,
      'chi_sim+eng',
      {
        logger: (m) => {
          if (m.status === 'recognizing text') {
            resultBox.innerHTML = `
              <div class="loading-spinner"></div>
              <div class="result-tip">识别进度：${Math.round(m.progress * 100)}%</div>
            `;
          }
        }
      }
    );
    const timeoutPromise = new Promise((_, reject) => 
      setTimeout(() => reject(new Error('识别超时（15秒）')), 15000)
    );

    const { data: { text } } = await Promise.race([recognizePromise, timeoutPromise]);

    // 3. 过滤垃圾文本，提取店名
    const shopName = cleanShopName(text);

    // 4. 弹出确认框，让用户手动确认，避免乱码
    confirmInput.value = shopName;
    confirmModal.style.display = 'flex';

    // 重置结果区域
    resultBox.innerHTML = `
      <div class="result-text">请确认店铺名</div>
      <div class="result-tip">识别结果可手动修改</div>
    `;

  } catch (err) {
    // 错误处理，兜底手动添加
    resultBox.innerHTML = `
      <div class="result-text" style="color:#ff5555;">❌ 识别失败</div>
      <div class="result-tip">${err.message}，请手动添加</div>
    `;
  }
});

// 确认添加识别的店铺
confirmAddBtn.addEventListener('click', () => {
  const shopName = confirmInput.value.trim();
  if (!shopName || shopName === '未识别到有效店名') {
    alert('请输入有效的店铺名');
    return;
  }

  if (shopList.includes(shopName)) {
    alert('该店铺已存在');
    confirmModal.style.display = 'none';
    return;
  }

  shopList.push(shopName);
  saveShopList();
  confirmModal.style.display = 'none';
  resultBox.innerHTML = `
    <div class="result-text" style="color:#28a745;">✅ 添加成功</div>
    <div class="result-tip">${shopName}</div>
  `;
});

// 取消添加
cancelAddBtn.addEventListener('click', () => {
  confirmModal.style.display = 'none';
  resultBox.innerHTML = `
    <div class="result-text">已取消添加</div>
    <div class="result-tip">可手动添加店铺</div>
  `;
});

// ==================== 初始化 ====================
renderShopList();
</script>

</body>
</html>
