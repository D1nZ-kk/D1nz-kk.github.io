<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍽️ 我的美食随机器 - k1ana.cn</title>
<style>
* {margin: 0; padding: 0; box-sizing: border-box;}
body {
    background: #0a0a0f;
    color: #eaeaea;
    font-family: 'Segoe UI', sans-serif;
    padding: 20px;
    line-height: 1.4;
}
.container {
    max-width: 500px;
    margin: 0 auto;
}
.card {
    background: #121217;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 0 20px rgba(100,50,200,0.15);
}
h1 {
    font-size: 22px;
    color: #fff;
    text-shadow: 0 0 10px #7266ff;
    margin-bottom: 8px;
}
.desc {
    font-size: 13px;
    color: #888;
    margin-bottom: 16px;
}
.upload-area {
    border: 2px dashed #7266ff;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 16px;
    transition: 0.2s;
}
.upload-area:hover {
    background: #1a1a24;
}
#imgInput {display: none;}
.ocr-tip {font-size: 13px; color: #aaa; margin-top: 6px;}

/* 随机推荐区域 */
.result {
    background: #1a1a24;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #ff5588;
    margin-bottom: 12px;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.btn-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}
.btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #7266ff, #ff5588);
    color: #fff;
    font-weight: bold;
    cursor: pointer;
}
.btn.del {background: #333; color: #ff5555;}
.btn.manual {background: #222; color: #7266ff;}

/* 店铺列表 */
.list-title {
    font-size: 16px;
    margin-bottom: 12px;
    color: #ddd;
}
.shop-item {
    background: #1a1a24;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.shop-name {flex: 1; font-size: 15px;}
.shop-edit, .shop-del {
    background: #282832;
    border: none;
    color: #aaa;
    padding: 6px 10px;
    border-radius: 6px;
    margin-left: 6px;
    cursor: pointer;
    font-size: 12px;
}
.shop-edit {color: #7266ff;}
.shop-del {color: #ff5555;}
.empty {text-align: center; color: #666; padding: 20px; font-size: 14px;}

/* 弹窗 */
.modal {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.modal-box {
    background: #121217;
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
}
.modal-title {
    font-size: 18px;
    margin-bottom: 16px;
}
.modal-input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    background: #1a1a24;
    border: 1px solid #333;
    color: #fff;
    margin-bottom: 16px;
    font-size: 15px;
}
.modal-btns {
    display: flex;
    gap: 10px;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🍽️ 我的美食随机器</h1>
        <p class="desc">截图导入店铺名 · 自定义列表 · 随机不纠结</p>

        <!-- 截图上传识别 -->
        <label class="upload-area" id="uploadBtn">
            <p>📸 上传外卖/点评截图导入店铺</p>
            <p class="ocr-tip">支持饿了么、美团、大众点评</p>
        </label>
        <input type="file" id="imgInput" accept="image/*">

        <!-- 随机结果 -->
        <div class="result" id="result">请先导入店铺～</div>

        <!-- 操作按钮 -->
        <div class="btn-row">
            <button class="btn" id="randomBtn">🎲 随机推荐</button>
            <button class="btn manual" id="addManual">✏️ 手动添加店铺</button>
        </div>

        <!-- 店铺列表 -->
        <div class="list-title">📋 我的店铺列表</div>
        <div id="shopList" class="empty">暂无店铺，快去导入吧～</div>
    </div>
</div>

<!-- 修改弹窗 -->
<div class="modal" id="editModal">
    <div class="modal-box">
        <div class="modal-title">修改店铺名</div>
        <input type="text" class="modal-input" id="editInput">
        <div class="modal-btns">
            <button class="btn" id="saveEdit">保存</button>
            <button class="btn del" id="cancelEdit">取消</button>
        </div>
    </div>
</div>

<!-- OCR识别库 -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
// 本地存储核心
let shopList = JSON.parse(localStorage.getItem('myShops')) || [];
let editingIndex = -1;

// DOM元素
const uploadBtn = document.getElementById('uploadBtn');
const imgInput = document.getElementById('imgInput');
const result = document.getElementById('result');
const randomBtn = document.getElementById('randomBtn');
const addManual = document.getElementById('addManual');
const shopListEl = document.getElementById('shopList');
const editModal = document.getElementById('editModal');
const editInput = document.getElementById('editInput');
const saveEdit = document.getElementById('saveEdit');
const cancelEdit = document.getElementById('cancelEdit');

// 渲染列表
function renderList() {
    if (shopList.length === 0) {
        shopListEl.innerHTML = '<div class="empty">暂无店铺，快去导入吧～</div>';
        return;
    }
    shopListEl.innerHTML = shopList.map((shop, idx) => `
        <div class="shop-item">
            <div class="shop-name">${shop}</div>
            <div>
                <button class="shop-edit" onclick="editShop(${idx})">修改</button>
                <button class="shop-del" onclick="delShop(${idx})">删除</button>
            </div>
        </div>
    `).join('');
}

// 保存到本地
function saveShops() {
    localStorage.setItem('myShops', JSON.stringify(shopList));
    renderList();
}

// 随机推荐
randomBtn.onclick = () => {
    if (shopList.length === 0) {
        result.innerText = '请先导入店铺哦～';
        return;
    }
    const rnd = shopList[Math.floor(Math.random() * shopList.length)];
    result.innerText = rnd;
};

// 截图上传
uploadBtn.onclick = () => imgInput.click();
imgInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    result.innerText = '正在识别截图...';
    try {
        const { data: { text } } = await Tesseract.recognize(file, 'chi_sim+eng');
        // 简单提取店名（取有效行）
        const lines = text.split('\n').map(l => l.trim()).filter(l => l && l.length > 2 && !/订单|编号|时间|配送|￥/.test(l));
        const shopName = lines[0] || '未识别到店名';
        
        if (!shopList.includes(shopName)) {
            shopList.push(shopName);
            saveShops();
            result.innerText = `✅ 导入成功：${shopName}`;
        } else {
            result.innerText = `⚠️ 已存在：${shopName}`;
        }
    } catch (err) {
        result.innerText = '识别失败，重试或手动添加';
    }
};

// 手动添加
addManual.onclick = () => {
    const name = prompt('请输入店铺名：');
    if (name && name.trim() && !shopList.includes(name.trim())) {
        shopList.push(name.trim());
        saveShops();
        result.innerText = `✅ 手动添加成功：${name.trim()}`;
    }
};

// 修改店铺
window.editShop = (idx) => {
    editingIndex = idx;
    editInput.value = shopList[idx];
    editModal.style.display = 'flex';
};
saveEdit.onclick = () => {
    const val = editInput.value.trim();
    if (val && !shopList.includes(val)) {
        shopList[editingIndex] = val;
        saveShops();
        editModal.style.display = 'none';
        result.innerText = `✅ 修改成功：${val}`;
    }
};
cancelEdit.onclick = () => editModal.style.display = 'none';

// 删除店铺
window.delShop = (idx) => {
    if (confirm('确定删除该店铺？')) {
        shopList.splice(idx, 1);
        saveShops();
        result.innerText = '🗑️ 已删除';
    }
};

// 初始化
renderList();
</script>
</body>
</html>
