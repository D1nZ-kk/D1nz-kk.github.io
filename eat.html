<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今晚吃什么？- k1ana.cn</title>
<style>
* {margin: 0; padding: 0; box-sizing: border-box;}
body {
    background: #0a0a0f;
    color: #eaeaea;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
h1 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #fff;
    text-shadow: 0 0 10px #7266ff;
}
.desc {
    font-size: 14px;
    color: #888;
    margin-bottom: 20px;
}
.box {
    background: #121217;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 30px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 0 30px rgba(100,50,200,0.2);
}
.tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 10px 0 20px;
}
.tag {
    padding: 6px 12px;
    background: #222;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
}
.tag.active {
    background: #7266ff;
    color: #fff;
}
.result {
    font-size: 18px;
    margin: 20px 0;
    padding: 16px;
    background: #1a1a24;
    border-radius: 10px;
    text-align: center;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
}
.name {
    font-weight: bold;
    color: #ff5588;
}
.btn-group {
    display: flex;
    gap: 10px;
}
.btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #7266ff, #ff5588);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}
.btn.hate {
    background: #333;
    color: #ff5555;
}
.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
</style>
</head>
<body>

<div class="box">
<h1>🎲 今晚吃什么？</h1>
<p class="desc">真实定位 · 附近商家 · 随机推荐</p>

<div class="tags">
<div class="tag active" data-key="餐饮">全部</div>
<div class="tag" data-key="火锅">火锅</div>
<div class="tag" data-key="烧烤">烧烤</div>
<div class="tag" data-key="奶茶">奶茶</div>
<div class="tag" data-key="西餐">西餐</div>
<div class="tag" data-key="快餐">快餐</div>
</div>

<div class="result" id="result">请先允许定位权限</div>

<div class="btn-group">
<button class="btn" id="roll" disabled>🎲 随机推荐</button>
<button class="btn hate" id="hate" disabled>❌ 不喜欢</button>
</div>
</div>

<!-- 🔒 这里填入你的专属 Key -->
<script src="https://map.qq.com/api/js?v=2.exp&key=XNTBZ-GOYCA-UZHKE-CNXDR-LAQ22-ZQFWB"></script>
<script>
const result = document.getElementById('result');
const rollBtn = document.getElementById('roll');
const hateBtn = document.getElementById('hate');
let currentKeyword = '餐饮';
let currentShop = null;
let shops = [];
let hated = JSON.parse(localStorage.getItem('hated')) || [];

// 切换分类
document.querySelectorAll('.tag').forEach(t => {
    t.onclick = () => {
        document.querySelectorAll('.tag').forEach(s => s.classList.remove('active'));
        t.classList.add('active');
        currentKeyword = t.dataset.key;
        result.innerText = '切换分类：' + currentKeyword;
    };
});

// 获取定位 + 搜索附近真实商家
function getLocation() {
    result.innerText = '正在获取位置...';
    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        searchNearby(lat, lng, currentKeyword);
    }, err => {
        result.innerText = '定位失败，请允许位置权限';
    });
}

// 搜索周边3公里商家
function searchNearby(lat, lng, keyword) {
    result.innerText = '正在加载附近商家...';
    const center = new qq.maps.LatLng(lat, lng);
    const search = new qq.maps.Search({
        complete: res => {
            if (!res?.detail?.length) {
                result.innerText = '未找到商家';
                return;
            }
            shops = res.detail.filter(s => !hated.includes(s.name));
            result.innerText = `已加载 ${shops.length} 家店`;
            rollBtn.disabled = false;
        }
    });
    search.searchNearBy(keyword, center, 3000);
}

// 随机推荐
rollBtn.onclick = () => {
    if (!shops.length) return;
    currentShop = shops[Math.floor(Math.random() * shops.length)];
    result.innerHTML = `<div class="name">🍽️ ${currentShop.name}</div><div>${currentShop.address || '位置未知'}</div>`;
    hateBtn.disabled = false;
};

// 不喜欢这家（避雷）
hateBtn.onclick = () => {
    if (!currentShop) return;
    hated.push(currentShop.name);
    localStorage.setItem('hated', JSON.stringify(hated));
    result.innerText = `✅ 已屏蔽：${currentShop.name}`;
    shops = shops.filter(s => s.name !== currentShop.name);
    hateBtn.disabled = true;
    currentShop = null;
};

// 页面加载自动获取定位
window.onload = getLocation;
</script>

</body>
</html>
