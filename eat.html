<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今晚吃啥？- k1ana.cn</title>
<style>
* {margin: 0; padding: 0; box-sizing: border-box;}
body {
    background: #0a0a0f;
    color: #eaeaea;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
h1 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #ffffff;
    text-shadow: 0 0 10px #7266ff;
}
.desc {
    font-size: 14px;
    color: #888;
    margin-bottom: 20px;
}
.box {
    background: #121217;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 30px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 0 30px rgba(100,50,200,0.2);
}
.tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 10px 0 20px;
}
.tag {
    padding: 6px 12px;
    background: #222;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: .2s;
}
.tag.active {
    background: #7266ff;
    color: #fff;
}
.result {
    font-size: 20px;
    margin: 20px 0;
    padding: 16px;
    background: #1a1a24;
    border-radius: 10px;
    text-align: center;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
.result .name {
    font-weight: bold;
    color: #ff5588;
    font-size: 22px;
}
.result .info {
    font-size: 14px;
    color: #aaa;
}
.btn-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}
.btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #7266ff, #ff5588);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: .2s;
    text-decoration: none;
    text-align: center;
}
.btn:hover {
    opacity: .9;
    transform: scale(1.02);
}
.btn.hate {
    background: #333;
    color: #ff5555;
}
.btn.hate:hover {
    background: #444;
}
.btn.back {
    background: #222;
    color: #fff;
    margin-top: 15px;
    width: 100%;
}
.btn.back:hover {
    background: #333;
}
</style>
</head>
<body>

<div class="box">
<h1>🎲 今晚吃什么？</h1>
<p class="desc">随机推荐不纠结，再也不用纠结吃啥啦！</p>
<div class="tags">
<div class="tag active" data-type="all">全部</div>
<div class="tag" data-type="hotpot">火锅</div>
<div class="tag" data-type="bbq">烧烤</div>
<div class="tag" data-type="milktea">奶茶</div>
<div class="tag" data-type="western">西餐</div>
<div class="tag" data-type="fastfood">快餐</div>
</div>
<div class="result" id="result">
    <span>点击下方「随机推荐」开始抽！</span>
</div>
<div class="btn-group">
    <button class="btn" id="rollBtn">🎲 随机推荐</button>
    <button class="btn hate" id="hateBtn" disabled>❌ 不喜欢这家</button>
</div>
<!-- 新增：返回主页按钮 -->
<a href="/" class="btn back">🏠 返回主页</a>
</div>

<script>
// 🎯 食物库（你可以随便加自己常吃的店！完全个性化）
const foods = {
    all: ["海底捞","木屋烧烤","蜜雪冰城","肯德基","麦当劳","星巴克","麻辣烫","麻辣香锅","日料","烤肉","披萨","黄焖鸡","沙县小吃","兰州拉面","炸鸡","汉堡","烤鱼","串串","冒菜","螺蛳粉","寿司","生腌","小龙虾","烧烤","火锅","奶茶","咖啡","甜品","面包","蛋糕","汉堡王","德克士","瑞幸","库迪","喜茶","奈雪","一点点","CoCo","茶百道","古茗","沪上阿姨","益禾堂","书亦烧仙草"],
    hotpot: ["海底捞","呷哺呷哺","串串火锅","重庆火锅","羊肉火锅","潮汕牛肉火锅","寿喜烧","铜锅涮肉","冒菜","麻辣烫"],
    bbq: ["木屋烧烤","烤串","烤冷面","烤翅","烤鱿鱼","烤生蚝","烤五花肉","烤蔬菜","烧烤摊","韩式烤肉"],
    milktea: ["蜜雪冰城","喜茶","奈雪","一点点","CoCo","茶百道","古茗","沪上阿姨","益禾堂","书亦烧仙草","瑞幸","库迪","星巴克","咖啡","甜品"],
    western: ["披萨","牛排","意面","汉堡王","肯德基","麦当劳","炸鸡","汉堡","日料","寿司"],
    fastfood: ["肯德基","麦当劳","黄焖鸡","沙县小吃","麻辣烫","兰州拉面","炸鸡","汉堡","德克士","汉堡王"]
};

// 全局变量
let currentType = "all";
let currentShop = "";
const rollBtn = document.getElementById('rollBtn');
const hateBtn = document.getElementById('hateBtn');
const resultEl = document.getElementById('result');

// 🔒 初始化：加载本地避雷列表（永久保存，下次打开还能用）
let hatedList = JSON.parse(localStorage.getItem('k1ana_hated_food')) || [];

// 🏷️ 标签切换
document.querySelectorAll('.tag').forEach(tag => {
    tag.addEventListener('click', function() {
        document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        currentType = this.dataset.type;
        resultEl.innerHTML = `<span>切换分类成功，点击「随机推荐」抽${this.innerText}！</span>`;
        hateBtn.disabled = true;
        currentShop = "";
    });
});

// 🎲 随机推荐函数
rollBtn.addEventListener('click', function() {
    // 过滤掉避雷的店
    let list = foods[currentType].filter(shop => !hatedList.includes(shop));
    
    // 避免过滤完没的选，自动清空避雷
    if (list.length === 0) {
        hatedList = [];
        localStorage.setItem('k1ana_hated_food', JSON.stringify(hatedList));
        list = foods[currentType];
        resultEl.innerHTML = `<span>避雷列表已清空，重新抽！</span>`;
    }
    
    // 随机选一个
    const randomIndex = Math.floor(Math.random() * list.length);
    currentShop = list[randomIndex];
    
    // 显示结果
    resultEl.innerHTML = `<div class="name">🍽️ ${currentShop}</div>`;
    hateBtn.disabled = false; // 启用避雷按钮
});

// ❌ 避雷函数（你要的「逐渐个性化」核心功能）
hateBtn.addEventListener('click', function() {
    if (!currentShop) return;
    
    // 加入避雷列表，永久保存
    hatedList.push(currentShop);
    localStorage.setItem('k1ana_hated_food', JSON.stringify(hatedList));
    
    // 提示
    resultEl.innerHTML = `<div class="info">✅ 已将「${currentShop}」加入避雷列表，下次不会再推荐！</div>`;
    hateBtn.disabled = true;
    currentShop = "";
});
</script>

</body>
</html>
