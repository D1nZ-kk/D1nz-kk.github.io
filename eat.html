<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 我的美食随机器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #eaeaea;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: #121217;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 0 20px rgba(114, 102, 255, 0.15);
        }

        h1 {
            font-size: 22px;
            color: #fff;
            text-shadow: 0 0 10px #7266ff;
            margin-bottom: 8px;
        }

        .desc {
            font-size: 13px;
            color: #888;
            margin-bottom: 16px;
        }

        /* OCR状态提示 */
        .ocr-status {
            font-size: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            background: #1a1a24;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ocr-status.ready {
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.3);
        }

        .ocr-status.loading {
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.3);
        }

        .ocr-status.error {
            color: #f87171;
            border-color: rgba(248, 113, 113, 0.3);
        }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed #7266ff;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all 0.3s ease;
            background: rgba(114, 102, 255, 0.05);
        }

        .upload-area:hover {
            background: rgba(114, 102, 255, 0.1);
            border-color: #8a7aff;
        }

        .upload-area.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .upload-text {
            font-size: 14px;
            color: #eaeaea;
            margin-bottom: 4px;
        }

        .upload-tip {
            font-size: 12px;
            color: #888;
        }

        #imgInput {
            display: none;
        }

        /* 随机推荐区域 */
        .result {
            background: linear-gradient(135deg, #1a1a24 0%, #1f1f2e 100%);
            border-radius: 10px;
            padding: 24px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #ff5588;
            margin-bottom: 16px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 85, 136, 0.2);
            box-shadow: 0 0 15px rgba(255, 85, 136, 0.1);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #7266ff, #ff5588);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(114, 102, 255, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.secondary {
            background: #333;
            color: #ff5555;
        }

        .btn.secondary:hover {
            background: #444;
        }

        .btn.outline {
            background: #222;
            color: #7266ff;
            border: 1px solid #7266ff;
        }

        .btn.outline:hover {
            background: #2a2a35;
        }

        /* 店铺列表 */
        .list-title {
            font-size: 16px;
            margin-bottom: 12px;
            color: #ddd;
            font-weight: 600;
        }

        .shop-item {
            background: #1a1a24;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a2a35;
            transition: all 0.2s;
        }

        .shop-item:hover {
            border-color: #7266ff;
            background: #1f1f2e;
        }

        .shop-name {
            flex: 1;
            font-size: 15px;
            color: #eaeaea;
        }

        .shop-btns {
            display: flex;
            gap: 6px;
        }

        .shop-edit,
        .shop-del {
            background: #282832;
            border: none;
            color: #aaa;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .shop-edit {
            color: #7266ff;
        }

        .shop-edit:hover {
            background: #7266ff;
            color: #fff;
        }

        .shop-del {
            color: #ff5555;
        }

        .shop-del:hover {
            background: #ff5555;
            color: #fff;
        }

        .empty {
            text-align: center;
            color: #666;
            padding: 30px;
            font-size: 14px;
            background: #1a1a24;
            border-radius: 8px;
            border: 1px dashed #333;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-box {
            background: #121217;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #333;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-size: 18px;
            margin-bottom: 16px;
            color: #fff;
            font-weight: 600;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            background: #1a1a24;
            border: 1px solid #333;
            color: #fff;
            margin-bottom: 16px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-input:focus {
            border-color: #7266ff;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .modal-btns .btn {
            flex: 1;
        }

        .modal-btns .btn:first-child {
            background: #333;
            color: #aaa;
        }

        .modal-btns .btn:first-child:hover {
            background: #444;
        }

        /* 截图预览 */
        .preview-container {
            margin-bottom: 16px;
            border-radius: 8px;
            overflow: hidden;
            background: #1a1a24;
            max-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 200px;
            object-fit: contain;
        }

        /* 识别进度 */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1a1a24;
            border-radius: 3px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7266ff, #ff5588);
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }

        .progress-text {
            font-size: 13px;
            color: #888;
            text-align: center;
            margin-bottom: 16px;
        }

        /* 识别结果列表 */
        .result-list {
            margin-bottom: 16px;
        }

        .result-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #1a1a24;
            border: 1px solid #333;
            border-radius: 8px;
            margin-bottom: 8px;
            gap: 10px;
        }

        .result-item:hover {
            border-color: #7266ff;
        }

        .result-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #7266ff;
        }

        .result-name {
            flex: 1;
            font-size: 14px;
            color: #eaeaea;
        }

        .result-name-input {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            background: #121217;
            border: 1px solid #444;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .result-name-input:focus {
            border-color: #7266ff;
        }

        .result-count {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
        }

        .result-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .result-actions .btn {
            padding: 10px 16px;
            font-size: 13px;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .card {
                padding: 20px;
            }

            .btn-row {
                flex-direction: column;
            }

            .shop-name {
                font-size: 14px;
            }

            .modal-box {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🍽️ 我的美食随机器</h1>
            <p class="desc">截图导入店铺名 · 智能识别 · 批量添加</p>

            <!-- OCR状态 -->
            <div class="ocr-status loading" id="ocrStatus">
                <span class="loading">⏳</span>
                <span>正在加载文字识别引擎...</span>
            </div>

            <!-- 上传区域 -->
            <div class="upload-area disabled" id="uploadBtn">
                <div class="upload-icon">📸</div>
                <div class="upload-text">点击上传外卖/点评截图</div>
                <div class="upload-tip">支持饿了么、美团、大众点评 · 可识别多个店铺</div>
            </div>
            <input type="file" id="imgInput" accept="image/*">

            <!-- 随机推荐 -->
            <div class="result" id="result">
                请先导入店铺～
            </div>

            <div class="btn-row">
                <button class="btn" id="randomBtn">🎲 随机推荐</button>
                <button class="btn secondary" id="clearBtn">🗑️ 清空列表</button>
            </div>

            <div class="btn-row">
                <button class="btn outline" id="addManual">✏️ 手动添加店铺</button>
            </div>
        </div>

        <!-- 店铺列表 -->
        <div class="card">
            <h2 class="list-title">📋 我的店铺列表 <span id="shopCount" style="font-size: 14px; color: #888; font-weight: normal;">(0)</span></h2>
            <div id="shopList">
                <div class="empty">暂无店铺，快去导入吧～</div>
            </div>
        </div>
    </div>

    <!-- 截图识别弹窗 -->
    <div class="modal" id="importModal">
        <div class="modal-box">
            <h3 class="modal-title">📸 识别截图中的店铺</h3>
            <div class="preview-container" id="previewContainer"></div>
            
            <!-- 识别进度 -->
            <div id="recognizeProgress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">准备识别...</div>
            </div>

            <!-- 识别结果列表 -->
            <div class="result-list" id="resultList" style="display: none;">
                <div class="result-count" id="resultCount">识别到 0 个可能的店铺</div>
                <div id="resultItems"></div>
                <div class="result-actions">
                    <button class="btn outline" id="selectAllBtn">全选</button>
                    <button class="btn outline" id="addManualBtn">+ 手动添加</button>
                </div>
            </div>

            <div class="modal-btns" id="importBtns" style="display: none;">
                <button class="btn" id="cancelImport">取消</button>
                <button class="btn" id="confirmImport">添加所选</button>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div class="modal" id="editModal">
        <div class="modal-box">
            <h3 class="modal-title">修改店铺名</h3>
            <input type="text" class="modal-input" id="editInput" placeholder="输入新的店铺名">
            <div class="modal-btns">
                <button class="btn" id="cancelEdit">取消</button>
                <button class="btn" id="saveEdit">保存</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
        // 本地存储
        let shopList = JSON.parse(localStorage.getItem('foodShops')) || [];
        let editingIndex = -1;
        let ocrReady = false;
        let recognizedShops = []; // 识别结果

        // DOM元素
        const uploadBtn = document.getElementById('uploadBtn');
        const imgInput = document.getElementById('imgInput');
        const result = document.getElementById('result');
        const randomBtn = document.getElementById('randomBtn');
        const clearBtn = document.getElementById('clearBtn');
        const addManual = document.getElementById('addManual');
        const shopListEl = document.getElementById('shopList');
        const shopCount = document.getElementById('shopCount');
        const ocrStatus = document.getElementById('ocrStatus');

        // 识别弹窗
        const importModal = document.getElementById('importModal');
        const previewContainer = document.getElementById('previewContainer');
        const recognizeProgress = document.getElementById('recognizeProgress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultList = document.getElementById('resultList');
        const resultCount = document.getElementById('resultCount');
        const resultItems = document.getElementById('resultItems');
        const selectAllBtn = document.getElementById('selectAllBtn');
        const addManualBtn = document.getElementById('addManualBtn');
        const confirmImport = document.getElementById('confirmImport');
        const cancelImport = document.getElementById('cancelImport');
        const importBtns = document.getElementById('importBtns');

        // 编辑弹窗
        const editModal = document.getElementById('editModal');
        const editInput = document.getElementById('editInput');
        const saveEdit = document.getElementById('saveEdit');
        const cancelEdit = document.getElementById('cancelEdit');

        // 初始化OCR（使用scheduler方式，更稳定）
        async function initOcr() {
            try {
                updateOcrStatus('loading', '⏳', '正在加载文字识别引擎...');
                
                // 使用 createScheduler 方式更稳定
                const scheduler = Tesseract.createScheduler();
                const worker = await Tesseract.createWorker('chi_sim+eng', 1, {
                    logger: m => {
                        if (m.status === 'loading tesseract core') {
                            updateOcrStatus('loading', '⏳', '加载OCR核心...');
                        } else if (m.status === 'initializing tesseract') {
                            updateOcrStatus('loading', '⏳', '初始化引擎...');
                        } else if (m.status === 'loading language traineddata') {
                            updateOcrStatus('loading', '⏳', '加载语言包(约15MB)...');
                        } else if (m.status === 'initializing api') {
                            updateOcrStatus('loading', '⏳', '准备就绪...');
                        } else if (m.status === 'recognizing text') {
                            const pct = Math.round(m.progress * 100);
                            updateOcrStatus('loading', '🔍', `识别中 ${pct}%`);
                        }
                    }
                });
                
                scheduler.addWorker(worker);
                
                // 存到window方便后续使用
                window.tesseractScheduler = scheduler;
                window.tesseractWorker = worker;
                
                ocrReady = true;
                updateOcrStatus('ready', '✅', '文字识别已就绪');
                uploadBtn.classList.remove('disabled');

            } catch (err) {
                console.error('OCR初始化失败:', err);
                updateOcrStatus('error', '⚠️', 'OCR加载失败，请刷新重试');
                ocrReady = false;
            }
        }

        function updateOcrStatus(type, icon, text) {
            ocrStatus.className = `ocr-status ${type}`;
            ocrStatus.innerHTML = `<span>${icon}</span><span>${text}</span>`;
        }

        // 渲染列表
        function renderList() {
            shopCount.textContent = `(${shopList.length})`;

            if (shopList.length === 0) {
                shopListEl.innerHTML = '<div class="empty">暂无店铺，快去导入吧～</div>';
                return;
            }

            shopListEl.innerHTML = shopList.map((shop, idx) => `
                <div class="shop-item">
                    <div class="shop-name">${shop}</div>
                    <div class="shop-btns">
                        <button class="shop-edit" onclick="editShop(${idx})">修改</button>
                        <button class="shop-del" onclick="delShop(${idx})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        // 保存到本地
        function saveShops() {
            localStorage.setItem('foodShops', JSON.stringify(shopList));
            renderList();
        }

        // 更新结果显示
        function showResult(text, isError = false) {
            result.innerHTML = text;
            result.style.color = isError ? '#ff5555' : '#ff5588';
        }

        // 随机推荐
        randomBtn.onclick = () => {
            if (shopList.length === 0) {
                showResult('❌ 请先导入店铺哦～', true);
                return;
            }

            let count = 0;
            const interval = setInterval(() => {
                const randomShop = shopList[Math.floor(Math.random() * shopList.length)];
                result.innerHTML = `<span class="loading">🎲</span> ${randomShop}`;
                count++;

                if (count >= 12) {
                    clearInterval(interval);
                    const finalShop = shopList[Math.floor(Math.random() * shopList.length)];
                    showResult(`🎉 今天吃：${finalShop}`);
                }
            }, 80);
        };

        // 清空列表
        clearBtn.onclick = () => {
            if (shopList.length === 0) {
                showResult('❌ 列表已经是空的了', true);
                return;
            }

            if (confirm('确定要清空所有店铺吗？')) {
                shopList = [];
                saveShops();
                showResult('🗑️ 已清空列表');
            }
        };

        // 上传截图
        uploadBtn.onclick = () => {
            if (!ocrReady) {
                alert('OCR引擎还未就绪，请稍候...');
                return;
            }
            imgInput.click();
        };

        imgInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 显示预览
            const reader = new FileReader();
            reader.onload = async (event) => {
                previewContainer.innerHTML = `<img src="${event.target.result}" alt="截图预览">`;
                
                // 重置弹窗状态
                recognizeProgress.style.display = 'block';
                progressFill.style.width = '0%';
                progressText.textContent = '准备识别...';
                resultList.style.display = 'none';
                importBtns.style.display = 'none';
                recognizedShops = [];
                
                importModal.style.display = 'flex';
                
                // 开始识别
                await recognizeImage(event.target.result);
            };
            reader.readAsDataURL(file);
            imgInput.value = '';
        };

        // OCR识别
        async function recognizeImage(imageData) {
            if (!ocrReady) {
                progressText.textContent = '❌ OCR未就绪';
                return;
            }

            try {
                progressText.textContent = '正在识别文字...';
                progressFill.style.width = '30%';

                const { data: { text, words } } = await window.tesseractWorker.recognize(imageData);
                
                progressFill.style.width = '70%';
                progressText.textContent = '正在分析店铺名...';

                console.log('OCR原始文本:\n', text);

                // 智能提取店铺名
                const shops = extractShopNames(text, words);
                
                progressFill.style.width = '100%';
                progressText.textContent = '识别完成！';

                recognizedShops = shops;
                
                setTimeout(() => {
                    recognizeProgress.style.display = 'none';
                    showRecognizedShops();
                }, 300);

            } catch (err) {
                console.error('识别错误:', err);
                progressText.textContent = `❌ 识别失败: ${err.message}`;
            }
        }

        // 智能提取店铺名
        function extractShopNames(text, words) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            const shops = [];
            
            // 店铺名常见关键词
            const shopKeywords = [
                '店', '馆', '厅', '坊', '吧', '屋', '房', '铺', '楼', '阁', '轩', '居',
                '料理', '美食', '小吃', '快餐', '汉堡', '披萨', '火锅', '烧烤', '串串',
                '奶茶', '咖啡', '面包', '蛋糕', '甜品', '烘焙', '饮品', '茶饮',
                '粥', '粉', '面', '饭', '菜', '鱼', '肉', '鸡', '鸭', '猪', '牛', '羊',
                '寿司', '拉面', '炸鸡', '麻辣烫', '螺蛳粉', '黄焖鸡', '沙县',
                '肯德基', '麦当劳', '必胜客', '德克士', '华莱士', '塔斯汀',
                '蜜雪冰城', '茶百道', '喜茶', '奈雪', '瑞幸', '星巴克',
                '沙县小吃', '兰州拉面', '黄焖鸡米饭', '杨国福', '张亮',
                '美团外卖', '饿了么', '大众点评'
            ];

            // 过滤关键词（非店名）
            const filterKeywords = [
                '订单', '编号', '下单', '时间', '配送', '包装', '优惠', '合计', '实付',
                '支付', '完成', '预计', '送达', '分钟', '公里', '地址', '电话', '手机',
                '备注', '发票', '评价', '投诉', '客服', '退款', '取消', '已接单',
                '骑手', '商家', '距离', '配送费', '餐盒费', '满减', '红包',
                '￥', '¥', '元', '减', '送', '起', '以下', '更多', '展开', '收起',
                '推荐', '热门', '附近', '评分', '月售', '好评', '销量', '人气',
                '搜索', '筛选', '排序', '分类', '收藏', '分享', '举报', '举报'
            ];

            // 按行分析
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line || line.length < 2 || line.length > 30) continue;

                // 跳过过滤词
                let shouldSkip = false;
                for (const fw of filterKeywords) {
                    if (line.includes(fw)) {
                        shouldSkip = true;
                        break;
                    }
                }
                if (shouldSkip) continue;

                // 跳过纯数字和价格
                if (/^\d+$/.test(line)) continue;
                if (/^[¥￥$]\s*\d/.test(line)) continue;
                if (/^\d+(\.\d+)?元?$/.test(line)) continue;

                // 清理特殊字符
                line = line.replace(/[^\u4e00-\u9fa5a-zA-Z0-9\s\-\.\(\)（）【】\[\]·&]/g, '').trim();
                if (!line || line.length < 2) continue;

                // 计算是否可能是店名
                let score = 0;
                
                // 包含店铺关键词
                for (const kw of shopKeywords) {
                    if (line.includes(kw)) {
                        score += 3;
                        break;
                    }
                }

                // 包含品牌名特征（中英文混合、特殊符号）
                if (/[a-zA-Z]/.test(line) && /[\u4e00-\u9fa5]/.test(line)) score += 2;
                if (/[·&\-()（）【】\[\]]/.test(line)) score += 1;
                
                // 长度适中
                if (line.length >= 3 && line.length <= 15) score += 1;

                // 行首位置（通常店名在每块内容的上方）
                if (i === 0 || lines[i-1].length === 0) score += 1;

                // 相邻行检查（如果下一行是菜品或价格，这一行更可能是店名）
                if (i + 1 < lines.length) {
                    const nextLine = lines[i + 1];
                    if (/^\d/.test(nextLine) || nextLine.includes('￥') || nextLine.includes('元')) {
                        score += 2;
                    }
                }

                // 如果分数足够高，认为是店名
                if (score >= 2) {
                    // 去重
                    if (!shops.includes(line)) {
                        shops.push({
                            name: line,
                            score: score,
                            selected: true
                        });
                    }
                }
            }

            // 按分数排序
            shops.sort((a, b) => b.score - a.score);

            // 如果没找到高分的，尝试用简单规则
            if (shops.length === 0) {
                for (let i = 0; i < Math.min(5, lines.length); i++) {
                    let line = lines[i].trim();
                    line = line.replace(/[^\u4e00-\u9fa5a-zA-Z0-9\s\-\.\·]/g, '').trim();
                    if (line.length >= 2 && line.length <= 20 && !shops.find(s => s.name === line)) {
                        shops.push({
                            name: line,
                            score: 1,
                            selected: true
                        });
                    }
                }
            }

            return shops;
        }

        // 显示识别结果
        function showRecognizedShops() {
            if (recognizedShops.length === 0) {
                resultList.style.display = 'block';
                resultCount.textContent = '未识别到店铺，请手动添加';
                resultItems.innerHTML = '';
                importBtns.style.display = 'flex';
                return;
            }

            resultCount.textContent = `识别到 ${recognizedShops.length} 个可能的店铺（可编辑修改）`;
            resultItems.innerHTML = recognizedShops.map((shop, idx) => `
                <div class="result-item">
                    <input type="checkbox" class="result-checkbox" data-idx="${idx}" ${shop.selected ? 'checked' : ''}>
                    <input type="text" class="result-name-input" data-idx="${idx}" value="${shop.name}">
                </div>
            `).join('');

            resultList.style.display = 'block';
            importBtns.style.display = 'flex';

            // 绑定复选框事件
            document.querySelectorAll('.result-checkbox').forEach(cb => {
                cb.onchange = (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    recognizedShops[idx].selected = e.target.checked;
                };
            });

            // 绑定输入框事件
            document.querySelectorAll('.result-name-input').forEach(input => {
                input.onchange = (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    recognizedShops[idx].name = e.target.value.trim();
                };
            });
        }

        // 全选/取消全选
        selectAllBtn.onclick = () => {
            const allSelected = recognizedShops.every(s => s.selected);
            recognizedShops.forEach(s => s.selected = !allSelected);
            document.querySelectorAll('.result-checkbox').forEach(cb => {
                cb.checked = !allSelected;
            });
        };

        // 手动添加到识别列表
        addManualBtn.onclick = () => {
            recognizedShops.push({
                name: '',
                score: 0,
                selected: true
            });
            showRecognizedShops();
            
            // 聚焦到新添加的输入框
            const inputs = document.querySelectorAll('.result-name-input');
            if (inputs.length > 0) {
                inputs[inputs.length - 1].focus();
            }
        };

        // 确认导入
        confirmImport.onclick = () => {
            const selectedShops = recognizedShops
                .filter(s => s.selected && s.name.trim())
                .map(s => s.name.trim());

            if (selectedShops.length === 0) {
                alert('请至少选择一个店铺');
                return;
            }

            let addedCount = 0;
            selectedShops.forEach(name => {
                if (!shopList.includes(name)) {
                    shopList.push(name);
                    addedCount++;
                }
            });

            saveShops();
            importModal.style.display = 'none';
            
            if (addedCount > 0) {
                showResult(`✅ 成功添加 ${addedCount} 个店铺`);
            } else {
                showResult('⚠️ 所有店铺已存在', true);
            }
        };

        cancelImport.onclick = () => {
            importModal.style.display = 'none';
        };

        // 点击弹窗外部关闭
        importModal.onclick = (e) => {
            if (e.target === importModal) {
                importModal.style.display = 'none';
            }
        };

        // 手动添加（主界面）
        addManual.onclick = () => {
            const name = prompt('请输入店铺名：');
            if (name && name.trim()) {
                const trimmedName = name.trim();
                if (shopList.includes(trimmedName)) {
                    showResult(`⚠️ 已存在：${trimmedName}`, true);
                } else {
                    shopList.push(trimmedName);
                    saveShops();
                    showResult(`✅ 添加成功：${trimmedName}`);
                }
            }
        };

        // 修改店铺
        window.editShop = (idx) => {
            editingIndex = idx;
            editInput.value = shopList[idx];
            editModal.style.display = 'flex';
            editInput.focus();
        };

        saveEdit.onclick = () => {
            const val = editInput.value.trim();
            if (!val) {
                alert('请输入店铺名');
                return;
            }

            if (val !== shopList[editingIndex] && shopList.includes(val)) {
                alert('该店铺已存在');
                return;
            }

            shopList[editingIndex] = val;
            saveShops();
            editModal.style.display = 'none';
            showResult(`✅ 修改成功：${val}`);
        };

        cancelEdit.onclick = () => {
            editModal.style.display = 'none';
        };

        editModal.onclick = (e) => {
            if (e.target === editModal) {
                editModal.style.display = 'none';
            }
        };

        editInput.onkeyup = (e) => {
            if (e.key === 'Enter') saveEdit.click();
        };

        // 删除店铺
        window.delShop = (idx) => {
            const deletedShop = shopList[idx];
            if (confirm(`确定删除 "${deletedShop}" 吗？`)) {
                shopList.splice(idx, 1);
                saveShops();
                showResult(`🗑️ 已删除：${deletedShop}`);
            }
        };

        // 初始化
        renderList();
        
        // 延迟初始化OCR，让页面先渲染
        setTimeout(initOcr, 100);
    </script>
</body>
</html>
