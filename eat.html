<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 我的美食随机器</title>
    <!-- 更换更稳定的Tesseract CDN，指定Worker路径解决电脑端跨域 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #eaeaea;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: #121217;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 0 20px rgba(114, 102, 255, 0.15);
        }

        h1 {
            font-size: 22px;
            color: #fff;
            text-shadow: 0 0 10px #7266ff;
            margin-bottom: 8px;
        }

        .desc {
            font-size: 13px;
            color: #888;
            margin-bottom: 16px;
        }

        /* OCR状态提示 */
        .ocr-status {
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            background: #1a1a24;
            border: 1px solid #333;
        }

        .ocr-status.ready {
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.3);
        }

        .ocr-status.loading {
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.3);
        }

        .ocr-status.error {
            color: #f87171;
            border-color: rgba(248, 113, 113, 0.3);
        }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed #7266ff;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all 0.3s ease;
            background: rgba(114, 102, 255, 0.05);
        }

        .upload-area:hover {
            background: rgba(114, 102, 255, 0.1);
            border-color: #8a7aff;
        }

        .upload-area.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .upload-text {
            font-size: 14px;
            color: #eaeaea;
            margin-bottom: 4px;
        }

        .upload-tip {
            font-size: 12px;
            color: #888;
        }

        #imgInput {
            display: none;
        }

        /* 随机推荐区域 */
        .result {
            background: linear-gradient(135deg, #1a1a24 0%, #1f1f2e 100%);
            border-radius: 10px;
            padding: 24px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #ff5588;
            margin-bottom: 16px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 85, 136, 0.2);
            box-shadow: 0 0 15px rgba(255, 85, 136, 0.1);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #7266ff, #ff5588);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(114, 102, 255, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.del {
            background: #333;
            color: #ff5555;
        }

        .btn.del:hover {
            background: #444;
            box-shadow: 0 4px 15px rgba(255, 85, 85, 0.3);
        }

        .btn.manual {
            background: #222;
            color: #7266ff;
            border: 1px solid #7266ff;
        }

        .btn.manual:hover {
            background: #2a2a35;
        }

        /* 店铺列表 */
        .list-title {
            font-size: 16px;
            margin-bottom: 12px;
            color: #ddd;
            font-weight: 600;
        }

        .shop-item {
            background: #1a1a24;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a2a35;
            transition: all 0.2s;
        }

        .shop-item:hover {
            border-color: #7266ff;
            background: #1f1f2e;
        }

        .shop-name {
            flex: 1;
            font-size: 15px;
            color: #eaeaea;
        }

        .shop-btns {
            display: flex;
            gap: 6px;
        }

        .shop-edit,
        .shop-del {
            background: #282832;
            border: none;
            color: #aaa;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .shop-edit {
            color: #7266ff;
        }

        .shop-edit:hover {
            background: #7266ff;
            color: #fff;
        }

        .shop-del {
            color: #ff5555;
        }

        .shop-del:hover {
            background: #ff5555;
            color: #fff;
        }

        .empty {
            text-align: center;
            color: #666;
            padding: 30px;
            font-size: 14px;
            background: #1a1a24;
            border-radius: 8px;
            border: 1px dashed #333;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal-box {
            background: #121217;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #333;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-size: 18px;
            margin-bottom: 16px;
            color: #fff;
            font-weight: 600;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            background: #1a1a24;
            border: 1px solid #333;
            color: #fff;
            margin-bottom: 16px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-input:focus {
            border-color: #7266ff;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .modal-btns .btn {
            flex: 1;
        }

        .modal-btns .btn:first-child {
            background: #333;
            color: #aaa;
        }

        .modal-btns .btn:first-child:hover {
            background: #444;
        }

        /* 截图预览 */
        .preview-container {
            margin-bottom: 16px;
            border-radius: 8px;
            overflow: hidden;
            background: #1a1a24;
            max-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
        }

        /* 识别进度条 */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1a1a24;
            border-radius: 3px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7266ff, #ff5588);
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }

        .progress-text {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-bottom: 12px;
        }

        /* 识别候选列表 */
        .candidates {
            margin-bottom: 12px;
        }

        .candidates-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }

        .candidate-btn {
            display: inline-block;
            padding: 6px 12px;
            margin: 4px;
            background: #1a1a24;
            border: 1px solid #333;
            border-radius: 6px;
            color: #eaeaea;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .candidate-btn:hover {
            border-color: #7266ff;
            background: #2a2a35;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .card {
                padding: 20px;
            }

            .btn-row {
                flex-direction: column;
            }

            .shop-name {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🍽️ 我的美食随机器</h1>
            <p class="desc">截图导入店铺名 · 自动识别 · 随机不纠结</p>

            <!-- OCR状态 -->
            <div class="ocr-status loading" id="ocrStatus">
                <span class="loading">⏳</span> 正在加载文字识别引擎...
            </div>

            <!-- 上传区域 -->
            <div class="upload-area disabled" id="uploadBtn">
                <div class="upload-icon">📸</div>
                <div class="upload-text">点击上传外卖/点评截图</div>
                <div class="upload-tip">支持饿了么、美团、大众点评</div>
            </div>
            <input type="file" id="imgInput" accept="image/*">

            <!-- 随机推荐 -->
            <div class="result" id="result">
                请先导入店铺～
            </div>

            <div class="btn-row">
                <button class="btn" id="randomBtn">🎲 随机推荐</button>
                <button class="btn del" id="clearBtn">🗑️ 清空列表</button>
            </div>

            <div class="btn-row">
                <button class="btn manual" id="addManual">✏️ 手动添加店铺</button>
            </div>
        </div>

        <!-- 店铺列表 -->
        <div class="card">
            <h2 class="list-title">📋 我的店铺列表 <span id="shopCount" style="font-size: 14px; color: #888; font-weight: normal;">(0)</span></h2>
            <div id="shopList">
                <div class="empty">暂无店铺，快去导入吧～</div>
            </div>
        </div>
    </div>

    <!-- 截图导入弹窗 -->
    <div class="modal" id="importModal">
        <div class="modal-box">
            <h3 class="modal-title">📸 识别截图中的店铺</h3>
            <div class="preview-container" id="previewContainer"></div>
            
            <!-- 识别进度 -->
            <div id="recognizeProgress" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">准备识别...</div>
            </div>

            <!-- 候选店名 -->
            <div class="candidates" id="candidatesBox" style="display: none;">
                <div class="candidates-title">👆 点击选择识别结果：</div>
                <div id="candidatesList"></div>
            </div>

            <input type="text" class="modal-input" id="importInput" placeholder="输入或选择店铺名称">
            <div class="modal-btns">
                <button class="btn" id="cancelImport">取消</button>
                <button class="btn" id="confirmImport">添加</button>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div class="modal" id="editModal">
        <div class="modal-box">
            <h3 class="modal-title">修改店铺名</h3>
            <input type="text" class="modal-input" id="editInput" placeholder="输入新的店铺名">
            <div class="modal-btns">
                <button class="btn" id="cancelEdit">取消</button>
                <button class="btn" id="saveEdit">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 本地存储
        let shopList = JSON.parse(localStorage.getItem('foodShops')) || [];
        let editingIndex = -1;
        let ocrWorker = null;
        let isOcrReady = false;

        // DOM元素
        const uploadBtn = document.getElementById('uploadBtn');
        const imgInput = document.getElementById('imgInput');
        const result = document.getElementById('result');
        const randomBtn = document.getElementById('randomBtn');
        const clearBtn = document.getElementById('clearBtn');
        const addManual = document.getElementById('addManual');
        const shopListEl = document.getElementById('shopList');
        const shopCount = document.getElementById('shopCount');
        const ocrStatus = document.getElementById('ocrStatus');

        // 截图导入弹窗
        const importModal = document.getElementById('importModal');
        const previewContainer = document.getElementById('previewContainer');
        const importInput = document.getElementById('importInput');
        const confirmImport = document.getElementById('confirmImport');
        const cancelImport = document.getElementById('cancelImport');
        const recognizeProgress = document.getElementById('recognizeProgress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const candidatesBox = document.getElementById('candidatesBox');
        const candidatesList = document.getElementById('candidatesList');

        // 编辑弹窗
        const editModal = document.getElementById('editModal');
        const editInput = document.getElementById('editInput');
        const saveEdit = document.getElementById('saveEdit');
        const cancelEdit = document.getElementById('cancelEdit');

        // 优化：初始化OCR - 解决电脑端卡顿/跨域问题
        async function initOcr() {
            try {
                ocrStatus.className = 'ocr-status loading';
                ocrStatus.innerHTML = '<span class="loading">⏳</span> 正在加载文字识别引擎...';

                // 配置Worker路径，解决电脑端file://协议跨域问题
                const workerOptions = {
                    logger: m => {
                        // 优化：降低DOM更新频率，避免线程阻塞
                        if (m.status === 'loading tesseract core' && m.progress > 0.1) {
                            ocrStatus.innerHTML = `<span class="loading">⏳</span> 加载OCR核心(${Math.floor(m.progress*100)}%)...`;
                        } else if (m.status === 'loading language traineddata' && m.progress > 0.1) {
                            ocrStatus.innerHTML = `<span class="loading">⏳</span> 加载中英文语言包(${Math.floor(m.progress*100)}%)...`;
                        }
                    },
                    // 指定CDN Worker路径，避免本地加载失败
                    workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js',
                    corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core.wasm.js'
                };

                // 超时处理：防止无限等待
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('OCR初始化超时')), 30000)
                );

                // 并行执行：初始化+超时检测
                ocrWorker = await Promise.race([
                    Tesseract.createWorker('chi_sim+eng', 1, workerOptions),
                    timeoutPromise
                ]);

                isOcrReady = true;
                ocrStatus.className = 'ocr-status ready';
                ocrStatus.innerHTML = '✅ 文字识别已就绪，可以上传截图了';
                uploadBtn.classList.remove('disabled');

            } catch (err) {
                console.error('OCR初始化失败:', err);
                ocrStatus.className = 'ocr-status error';
                ocrStatus.innerHTML = '⚠️ OCR加载失败，将使用手动输入模式';
                isOcrReady = false;
                // 即使OCR失败，也解锁上传按钮（降级为纯手动输入）
                uploadBtn.classList.remove('disabled');
            }
        }

        // 渲染列表
        function renderList() {
            shopCount.textContent = `(${shopList.length})`;

            if (shopList.length === 0) {
                shopListEl.innerHTML = '<div class="empty">暂无店铺，快去导入吧～</div>';
                return;
            }

            shopListEl.innerHTML = shopList.map((shop, idx) => `
                <div class="shop-item">
                    <div class="shop-name">${shop}</div>
                    <div class="shop-btns">
                        <button class="shop-edit" onclick="editShop(${idx})">修改</button>
                        <button class="shop-del" onclick="delShop(${idx})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        // 保存到本地
        function saveShops() {
            localStorage.setItem('foodShops', JSON.stringify(shopList));
            renderList();
        }

        // 更新结果显示
        function showResult(text, isError = false) {
            result.innerHTML = text;
            result.style.color = isError ? '#ff5555' : '#ff5588';
        }

        // 随机推荐
        randomBtn.onclick = () => {
            if (shopList.length === 0) {
                showResult('❌ 请先导入店铺哦～', true);
                return;
            }

            let count = 0;
            const maxCount = 10;
            const interval = setInterval(() => {
                const randomShop = shopList[Math.floor(Math.random() * shopList.length)];
                result.innerHTML = `<span class="loading">🎲</span> ${randomShop}`;
                count++;

                if (count >= maxCount) {
                    clearInterval(interval);
                    const finalShop = shopList[Math.floor(Math.random() * shopList.length)];
                    showResult(`🎉 今天吃：${finalShop}`);
                }
            }, 100);
        };

        // 清空列表
        clearBtn.onclick = () => {
            if (shopList.length === 0) {
                showResult('❌ 列表已经是空的了', true);
                return;
            }

            if (confirm('确定要清空所有店铺吗？此操作不可恢复！')) {
                shopList = [];
                saveShops();
                showResult('🗑️ 已清空列表');
            }
        };

        // 截图上传
        uploadBtn.onclick = () => {
            imgInput.click();
        };

        imgInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 显示预览
            const reader = new FileReader();
            reader.onload = async (event) => {
                previewContainer.innerHTML = `<img src="${event.target.result}" alt="截图预览">`;
                importInput.value = '';
                candidatesBox.style.display = 'none';
                recognizeProgress.style.display = 'block';
                progressFill.style.width = '0%';
                importModal.style.display = 'flex';
                
                // 开始OCR识别
                await recognizeImage(event.target.result);
            };
            reader.readAsDataURL(file);
            imgInput.value = '';
        };

        // OCR识别图片
        async function recognizeImage(imageData) {
            // 即使OCR未就绪，也显示手动输入界面
            if (!isOcrReady) {
                progressFill.style.width = '100%';
                progressText.textContent = 'OCR未就绪，请手动输入店铺名';
                setTimeout(() => {
                    recognizeProgress.style.display = 'none';
                }, 1000);
                return;
            }

            try {
                progressText.textContent = '正在识别文字...';
                progressFill.style.width = '10%';

                // 分步识别，增加进度反馈
                const recognizeProcess = ocrWorker.recognize(
                    imageData,
                    { 
                        tessedit_pageseg_mode: 3, // 自动分页模式，适配多店铺列表
                        preserve_interword_spaces: 1 // 保留单词间距，提升中文识别
                    },
                    {
                        progress: (p) => {
                            // 更新进度条
                            const progress = Math.floor(p * 90) + 10; // 10%-100%
                            progressFill.style.width = `${progress}%`;
                            progressText.textContent = `识别中(${progress}%)...`;
                        }
                    }
                );

                const { data: { text } } = await recognizeProcess;
                progressFill.style.width = '100%';
                progressText.textContent = '识别完成！正在解析店名...';

                console.log('OCR原始结果:', text);

                // 优化：智能提取店名
                const candidates = extractShopNamesOptimized(text);

                setTimeout(() => {
                    recognizeProgress.style.display = 'none';
                    
                    if (candidates.length > 0) {
                        // 显示候选店名
                        candidatesBox.style.display = 'block';
                        candidatesList.innerHTML = candidates.map(name => 
                            `<button class="candidate-btn" onclick="selectCandidate('${name}')">${name}</button>`
                        ).join('');
                        
                        // 自动填入第一个候选
                        importInput.value = candidates[0];
                        importInput.focus();
                        importInput.select();
                    } else {
                        candidatesBox.style.display = 'none';
                        progressText.textContent = '未识别到店名，请手动输入';
                    }
                }, 800);

            } catch (err) {
                console.error('OCR识别错误:', err);
                progressFill.style.width = '100%';
                progressText.textContent = '识别失败，请手动输入';
                setTimeout(() => {
                    recognizeProgress.style.display = 'none';
                }, 1000);
            }
        }

        // 优化：智能提取店名（适配外卖多店铺截图）
        function extractShopNamesOptimized(text) {
            // 1. 按行分割并预处理
            const lines = text.split('\n')
                .map(l => l.trim())
                .filter(l => l.length >= 2); // 过滤空行/超短文本

            // 2. 外卖平台专属过滤规则（重点优化）
            const shopLineFilter = (line) => {
                // 排除明显非店铺名的关键词（覆盖美团/饿了么/点评）
                const excludeKeywords = [
                    // 基础排除
                    '订单', '编号', '时间', '配送', '包装', '优惠', '合计', '实付', '支付', '完成', '预计', '送达', 
                    '分钟', '公里', '地址', '电话', '手机', '备注', '发票', '评价', '投诉', '客服', '退款', '取消',
                    // 外卖平台专属
                    '月售', '评分', '起送', '配送费', '打包费', '满减', '优惠', '折扣', '券', '红包', '立减', '特价',
                    '热销', '新品', '推荐', '商家', '店铺', '距离', '人均', '营业时间', '休息中', '营业中', '暂停营业',
                    '已售', '好评', '中评', '差评', '口味', '包装', '配送速度', '骑手', '取餐', '确认收货', '申请售后',
                    // 价格/序号排除
                    '¥', '￥', '$', '美团', '饿了么', '大众点评', '抖音团购', '小红书',
                    '1.', '2.', '3.', '4.', '5.', '6.', '7.', '8.', '9.', '0.', // 序号
                    '①', '②', '③', '④', '⑤', '⑥', '⑦', '⑧', '⑨', '⑩' // 圈形序号
                ];

                // 排除包含以上关键词的行
                if (excludeKeywords.some(key => line.includes(key))) return false;
                
                // 排除纯数字/纯符号行
                if (/^\d+$/.test(line)) return false;
                if (/^[^\u4e00-\u9fa5a-zA-Z]+$/.test(line)) return false; // 无中文/英文
                
                // 排除价格开头的行（如 ¥20、18.8元）
                if (/^[¥￥$]\s*\d/.test(line)) return false;
                if (/^\d+(\.\d+)?\s*元/.test(line)) return false;
                
                // 排除序号开头的行（如 1、2、(1)、【1】）
                if (/^[\d①②③④⑤⑥⑦⑧⑨⑩]{1,2}[\.\-\)（）【】\[\]]\s*/.test(line)) return false;
                
                return true;
            };

            // 3. 筛选出候选行
            const candidateLines = lines.filter(shopLineFilter);

            // 4. 深度清洗店铺名（去除干扰字符）
            const cleanShopName = (name) => {
                // 保留：中文、英文、数字、常见店铺名符号（- . ()（）【】·）
                const cleaned = name.replace(/[^\u4e00-\u9fa5a-zA-Z0-9\s\-\.\(\)（）【】\[\]·]/g, '').trim();
                // 过滤清洗后过短/过长的文本（店铺名通常2-20字）
                return cleaned.length >= 2 && cleaned.length <= 20 ? cleaned : '';
            };

            // 5. 清洗并去重
            const cleanedNames = candidateLines
                .map(cleanShopName)
                .filter(name => name) // 过滤清洗后为空的
                .filter((name, idx, arr) => arr.indexOf(name) === idx); // 去重

            // 6. 补充优化：如果识别结果少，放宽过滤规则（避免漏识别）
            if (cleanedNames.length <= 1) {
                const relaxedLines = lines
                    .filter(l => l.length >= 3)
                    .map(cleanShopName)
                    .filter(name => name)
                    .filter((name, idx, arr) => arr.indexOf(name) === idx);
                return relaxedLines.length > cleanedNames.length ? relaxedLines : cleanedNames;
            }

            return cleanedNames;
        }

        // 选择候选店名
        window.selectCandidate = (name) => {
            importInput.value = name;
            importInput.focus();
        };

        // 确认导入
        confirmImport.onclick = () => {
            const name = importInput.value.trim();
            if (!name) {
                alert('请输入店铺名称');
                return;
            }

            if (shopList.includes(name)) {
                alert('该店铺已存在');
                return;
            }

            shopList.push(name);
            saveShops();
            importModal.style.display = 'none';
            showResult(`✅ 添加成功：${name}`);
        };

        cancelImport.onclick = () => {
            importModal.style.display = 'none';
        };

        // 回车确认
        importInput.onkeyup = (e) => {
            if (e.key === 'Enter') {
                confirmImport.click();
            }
        };

        // 手动添加
        addManual.onclick = () => {
            const name = prompt('请输入店铺名：');
            if (name && name.trim()) {
                const trimmedName = name.trim();
                if (shopList.includes(trimmedName)) {
                    showResult(`⚠️ 已存在：${trimmedName}`, true);
                } else {
                    shopList.push(trimmedName);
                    saveShops();
                    showResult(`✅ 手动添加成功：${trimmedName}`);
                }
            }
        };

        // 修改店铺
        window.editShop = (idx) => {
            editingIndex = idx;
            editInput.value = shopList[idx];
            editModal.style.display = 'flex';
            editInput.focus();
        };

        saveEdit.onclick = () => {
            const val = editInput.value.trim();
            if (!val) {
                alert('请输入店铺名');
                return;
            }

            if (val !== shopList[editingIndex] && shopList.includes(val)) {
                alert('该店铺已存在');
                return;
            }

            shopList[editingIndex] = val;
            saveShops();
            editModal.style.display = 'none';
            showResult(`✅ 修改成功：${val}`);
        };

        cancelEdit.onclick = () => {
            editModal.style.display = 'none';
        };

        // 点击弹窗外部关闭
        importModal.onclick = (e) => {
            if (e.target === importModal) {
                importModal.style.display = 'none';
            }
        };

        editModal.onclick = (e) => {
            if (e.target === editModal) {
                editModal.style.display = 'none';
            }
        };

        // 回车保存编辑
        editInput.onkeyup = (e) => {
            if (e.key === 'Enter') {
                saveEdit.click();
            }
        };

        // 删除店铺
        window.delShop = (idx) => {
            const deletedShop = shopList[idx];
            if (confirm(`确定删除 "${deletedShop}" 吗？`)) {
                shopList.splice(idx, 1);
                saveShops();
                showResult(`🗑️ 已删除：${deletedShop}`);
            }
        };

        // 初始化
        renderList();
        initOcr(); // 启动OCR
    </script>
</body>
</html>
