<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 今晚吃什么？- k1ana.cn</title>
<style>
* {margin: 0; padding: 0; box-sizing: border-box;}
body {
    background: #0a0a0f;
    color: #eaeaea;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
h1 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #ffffff;
    text-shadow: 0 0 10px #7266ff;
}
.desc {
    font-size: 14px;
    color: #888;
    margin-bottom: 20px;
}
.box {
    background: #121217;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 30px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 0 30px rgba(100,50,20,0.2);
}
.tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 10px 0 20px;
}
.tag {
    padding: 6px 12px;
    background: #222;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: .2s;
}
.tag.active {
    background: #7266ff;
    color: #fff;
}
.result {
    font-size: 20px;
    margin: 20px 0;
    padding: 16px;
    background: #1a1a24;
    border-radius: 10px;
    text-align: center;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
.result .name {
    font-weight: bold;
    color: #ff5588;
    font-size: 22px;
}
.result .info {
    font-size: 14px;
    color: #aaa;
}
.btn-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}
.btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #7266ff, #ff5588);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: .2s;
}
.btn:hover {
    opacity: .9;
    transform: scale(1.02);
}
.btn.hate {
    background: #333;
    color: #ff5555;
}
.btn.hate:hover {
    background: #444;
}
.btn:disabled {
    opacity: .5;
    cursor: not-allowed;
    transform: none;
}
.loading {
    color: #7266ff;
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    0%, 100% {opacity: 1;}
    50% {opacity: .5;}
}
.upload-box {
    margin: 20px 0;
    padding: 20px;
    border: 2px dashed #7266ff;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    transition: .2s;
}
.upload-box:hover {
    background: #1a1a24;
}
#imageInput {
    display: none;
}
.ocr-result {
    margin-top: 10px;
    padding: 10px;
    background: #1a1a24;
    border-radius: 8px;
    text-align: left;
    font-size: 14px;
    color: #aaa;
}
</style>
</head>
<body>

<div class="box">
<h1>🎲 今晚吃什么？</h1>
<p class="desc">真实定位 · 附近商家 · 随机推荐</p>
<div class="tags">
<div class="tag active" data-type="all">全部</div>
<div class="tag" data-type="hotpot">火锅</div>
<div class="tag" data-type="bbq">烧烤</div>
<div class="tag" data-type="milktea">奶茶</div>
<div class="tag" data-type="western">西餐</div>
<div class="tag" data-type="fastfood">快餐</div>
</div>
<div class="result" id="result">
    <span class="loading">正在获取你的位置...</span>
</div>
<div class="btn-group">
    <button class="btn" id="rollBtn" disabled>🎲 随机推荐</button>
    <button class="btn hate" id="hateBtn" disabled>❌ 不喜欢</button>
</div>

<!-- 外卖截图识别功能 -->
<div class="upload-box" id="uploadBox">
    <p>📸 上传外卖截图自动识别商家（支持饿了么/美团）</p>
    <input type="file" id="imageInput" accept="image/*" capture="environment">
</div>
<div id="ocrResult" class="ocr-result" style="display: none;"></div>
</div>

<!-- 引入腾讯地图JS API和Tesseract.js -->
<script src="https://map.qq.com/api/js?v=2.exp&key=XNTBZ-GQYCA-UZHKE-CNXDR-LAQ22-ZQFWB"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
// 🔑 已填好你的专属腾讯地图Key，无需修改
const TENCENT_MAP_KEY = "XNTBZ-GQYCA-UZHKE-CNXDR-LAQ22-ZQFWB";
// 🌍 搜索半径（米），可修改：1000=1公里，2000=2公里，3000=3公里
const SEARCH_RADIUS = 2000;

// 📦 本地商家库（API失败时兜底，可自定义添加）
const localFoods = {
    all: ["海底捞","木屋烧烤","蜜雪冰城","肯德基","麦当劳","星巴克","麻辣烫","麻辣香锅","日料","烤肉","披萨","黄焖鸡","沙县小吃","兰州拉面","炸鸡","汉堡","烤鱼","串串","冒菜","螺蛳粉"],
    hotpot: ["海底捞","呷哺呷哺","串串火锅","重庆火锅","羊肉火锅","潮汕牛肉火锅","寿喜烧","铜锅涮肉"],
    bbq: ["木屋烧烤","烤串","烤冷面","烤翅","烤鱿鱼","烤生蚝","韩式烤肉"],
    milktea: ["蜜雪冰城","喜茶","奈雪","一点点","CoCo","茶百道","古茗","沪上阿姨"],
    western: ["披萨","牛排","意面","汉堡王","肯德基","麦当劳","日料","寿司"],
    fastfood: ["肯德基","麦当劳","黄焖鸡","沙县小吃","麻辣烫","兰州拉面","炸鸡","汉堡"]
};

// 全局变量
let currentType = "all";
let currentShop = "";
let nearbyShops = []; // 存储真实附近商家
let currentFoods = localFoods; // 默认本地
const rollBtn = document.getElementById('rollBtn');
const hateBtn = document.getElementById('hateBtn');
const resultEl = document.getElementById('result');
const uploadBox = document.getElementById('uploadBox');
const imageInput = document.getElementById('imageInput');
const ocrResultEl = document.getElementById('ocrResult');

// 🔒 初始化避雷列表（本地永久存储）
let hatedList = JSON.parse(localStorage.getItem('k1ana_hated_food')) || [];

// 1. 初始化定位和附近商家（彻底解决加载问题，双重兜底）
function initLocation() {
    resultEl.innerHTML = `<span class="loading">正在获取你的位置...</span>`;
    rollBtn.disabled = true;
    hateBtn.disabled = true;

    // 浏览器原生定位
    navigator.geolocation.getCurrentPosition(async function(pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        resultEl.innerHTML = `<span class="loading">正在加载附近${SEARCH_RADIUS/1000}公里商家...</span>`;
        
        try {
            // 调用腾讯地图WebServiceAPI获取真实附近商家
            const url = `https://apis.map.qq.com/ws/place/v1/search?keyword=餐厅&boundary=nearby(${lat},${lng},${SEARCH_RADIUS})&page_size=20&key=${TENCENT_MAP_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            
            if (data.status === 0 && data.data.length > 0) {
                // 成功获取真实商家，自动分类
                nearbyShops = data.data.map(item => item.title);
                currentFoods = {
                    all: nearbyShops,
                    hotpot: nearbyShops.filter(shop => /火锅|串串|涮肉/.test(shop)),
                    bbq: nearbyShops.filter(shop => /烧烤|烤肉|烤串/.test(shop)),
                    milktea: nearbyShops.filter(shop => /奶茶|咖啡|茶饮/.test(shop)),
                    western: nearbyShops.filter(shop => /西餐|披萨|牛排|日料|寿司/.test(shop)),
                    fastfood: nearbyShops.filter(shop => /快餐|汉堡|炸鸡|沙县|拉面/.test(shop))
                };
                resultEl.innerHTML = `<span>定位成功！已加载${nearbyShops.length}家真实附近商家，点击按钮随机推荐！</span>`;
            } else {
                // API返回空，自动切换本地商家兜底
                currentFoods = localFoods;
                resultEl.innerHTML = `<span>附近商家较少，已切换本地推荐，点击按钮随机推荐！</span>`;
            }
            rollBtn.disabled = false;
        } catch (err) {
            // 网络/API异常，自动切换本地商家，永远不崩
            currentFoods = localFoods;
            resultEl.innerHTML = `<span>网络异常，已切换本地推荐，点击按钮随机推荐！</span>`;
            rollBtn.disabled = false;
        }
    }, function(err) {
        // 定位失败，自动切换本地商家
        currentFoods = localFoods;
        resultEl.innerHTML = `<span>定位失败，已切换本地推荐，点击按钮随机推荐！</span>`;
        rollBtn.disabled = false;
    }, {
        enableHighAccuracy: false,
        timeout: 10000,
        maximumAge: 300000
    });
}

// 2. 分类标签切换
document.querySelectorAll('.tag').forEach(tag => {
    tag.addEventListener('click', function() {
        document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        currentType = this.dataset.type;
        resultEl.innerHTML = `<span>切换分类成功，点击「随机推荐」抽${this.innerText}！</span>`;
        hateBtn.disabled = true;
        currentShop = "";
    });
});

// 3. 随机推荐功能
rollBtn.addEventListener('click', function() {
    // 过滤避雷商家
    let list = currentFoods[currentType].filter(shop => !hatedList.includes(shop));
    
    // 避雷过多自动清空，避免无店可抽
    if (list.length === 0) {
        hatedList = [];
        localStorage.setItem('k1ana_hated_food', JSON.stringify(hatedList));
        list = currentFoods[currentType];
        resultEl.innerHTML = `<span>避雷列表已清空，重新抽！</span>`;
    }
    
    // 随机抽取
    const randomShop = list[Math.floor(Math.random()*list.length)];
    currentShop = randomShop;
    resultEl.innerHTML = `<div class="name">🍽️ ${randomShop}</div>`;
    hateBtn.disabled = false;
});

// 4. 避雷功能（永久存储，越用越懂你）
hateBtn.addEventListener('click', function() {
    if (!currentShop) return;
    
    hatedList.push(currentShop);
    localStorage.setItem('k1ana_hated_food', JSON.stringify(hatedList));
    resultEl.innerHTML = `<div class="info">✅ 已将「${currentShop}」加入避雷列表，下次不会再推荐！</div>`;
    hateBtn.disabled = true;
    currentShop = "";
});

// 5. 外卖截图OCR识别（纯前端，无需后端）
uploadBox.addEventListener('click', function() {
    imageInput.click();
});

imageInput.addEventListener('change', async function(e) {
    if (!e.target.files[0]) return;
    
    const file = e.target.files[0];
    ocrResultEl.style.display = 'block';
    ocrResultEl.innerHTML = `<span class="loading">正在识别截图...</span>`;
    
    try {
        // 调用Tesseract.js识别中英文
        const { data: { text } } = await Tesseract.recognize(
            file,
            'chi_sim+eng',
            { logger: m => console.log(m) }
        );
        
        // 提取商家名称（适配美团/饿了么截图规则）
        let shopName = "";
        const lines = text.split('\n').map(line => line.trim()).filter(line => line);
        
        // 优先提取非订单信息的首行商家名
        for (let i = 0; i < Math.min(5, lines.length); i++) {
            if (!lines[i].includes('订单') && !lines[i].includes('编号') && !lines[i].includes('时间') && lines[i].length > 2) {
                shopName = lines[i];
                break;
            }
        }
        // 兜底提取
        shopName = shopName || lines[0] || "未识别到商家";
        
        ocrResultEl.innerHTML = `
            <p>📝 识别结果：</p>
            <p>🏪 商家名称：<span style="color:#ff5588;">${shopName}</span></p>
            <p>📋 完整文本：<br>${text.substring(0, 300)}${text.length > 300 ? '...' : ''}</p>
            <button class="btn" style="width:100%;margin-top:10px;" onclick="addShopToFoods('${encodeURIComponent(shopName)}')">➕ 添加到推荐库</button>
        `;
    } catch (err) {
        ocrResultEl.innerHTML = `<span style="color:#ff5555;">识别失败：${err.message}</span>`;
    }
});

// 全局方法：添加识别的商家到推荐库
function addShopToFoods(encodedShopName) {
    const shopName = decodeURIComponent(encodedShopName);
    if (!shopName || shopName === "未识别到商家") return;
    
    if (!currentFoods.all.includes(shopName)) {
        currentFoods.all.push(shopName);
        // 自动分类
        if (/火锅|串串|涮肉/.test(shopName)) currentFoods.hotpot.push(shopName);
        if (/烧烤|烤肉|烤串/.test(shopName)) currentFoods.bbq.push(shopName);
        if (/奶茶|咖啡|茶饮/.test(shopName)) currentFoods.milktea.push(shopName);
        if (/西餐|披萨|牛排|日料|寿司/.test(shopName)) currentFoods.western.push(shopName);
        if (/快餐|汉堡|炸鸡|沙县|拉面/.test(shopName)) currentFoods.fastfood.push(shopName);
        
        resultEl.innerHTML = `<span>✅ 已添加「${shopName}」到推荐库，现在可以随机推荐啦！</span>`;
        ocrResultEl.style.display = 'none';
    } else {
        resultEl.innerHTML = `<span>「${shopName}」已在推荐库中！</span>`;
    }
}

// 页面加载自动初始化
window.onload = initLocation;
</script>

</body>
</html>
